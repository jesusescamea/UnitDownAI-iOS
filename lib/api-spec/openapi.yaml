openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: hvac
    description: HVAC diagnosis operations
  - name: ai
    description: AI-assisted documentation tools
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /ai/polish:
    post:
      operationId: aiPolish
      tags: [ai]
      summary: Polish HVAC field notes with AI
      description: Rewrites technician field notes in a chosen style without adding or fabricating any technical facts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPolishBody"
      responses:
        "200":
          description: Polished text result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPolishResponse"
        "400":
          description: Invalid request body
        "429":
          description: Rate limited or Pro subscription required
  /ai/voice/interpret:
    post:
      operationId: voiceInterpret
      tags: [ai]
      summary: HVAC Voice Intelligence — interpret a voice transcript
      description: >
        Runs a raw voice transcript through the HVAC Voice Intelligence pipeline.
        Applies HVAC terminology correction, generates three documentation versions
        (original, professional, customer), scores interpretation confidence,
        identifies uncertain phrases, and extracts equipment memory data —
        all in a single call.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceInterpretBody"
      responses:
        "200":
          description: HVAC-interpreted voice result with all documentation versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceInterpretResult"
        "400":
          description: Invalid request body
        "500":
          description: AI interpretation unavailable
  /hvac/diagnose:
    post:
      operationId: diagnoseHvac
      tags: [hvac]
      summary: Diagnose HVAC symptoms
      description: Analyzes HVAC symptoms against the knowledge base and returns the top 3 matching diagnoses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnoseHvacBody"
      responses:
        "200":
          description: Diagnosis results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HvacDiagnosisResult"
components:
  schemas:
    AiPolishMode:
      type: string
      enum:
        - professional
        - technician
        - warranty
        - equipment-memory
        - pm-summary
        - email-customer
        - work-order
      description: Writing style to apply when polishing
    AiPolishBody:
      type: object
      properties:
        text:
          type: string
          description: Raw field notes to polish
        mode:
          $ref: "#/components/schemas/AiPolishMode"
        clientId:
          type: string
          description: Optional Clerk user ID for Pro status lookup
        fromVoice:
          type: boolean
          description: When true, applies a speech-interpretation pass first to correct likely speech recognition errors (mishearings, phonetic substitutions) before applying the writing style.
      required:
        - text
        - mode
    AiPolishResponse:
      type: object
      properties:
        polished:
          type: string
          description: Improved version of the input text
      required:
        - polished
    UserVoiceCorrection:
      type: object
      description: A learned correction from a technician's personal vocabulary profile
      properties:
        original:
          type: string
          description: The word or phrase as the technician spoke it
        preferred:
          type: string
          description: The technician's preferred interpretation or spelling
        count:
          type: integer
          minimum: 1
          description: Number of times the technician has confirmed this preference
      required:
        - original
        - preferred
        - count
    VoiceInterpretBody:
      type: object
      properties:
        rawTranscript:
          type: string
          description: Raw speech-recognition transcript from the technician
        userCorrections:
          type: array
          items:
            $ref: "#/components/schemas/UserVoiceCorrection"
          description: Optional personal vocabulary corrections learned from this technician's past usage
      required:
        - rawTranscript
    VoiceUncertainPhrase:
      type: object
      description: A phrase the AI was less than 85% confident in interpreting
      properties:
        original:
          type: string
          description: The phrase exactly as it appeared in the raw transcript
        suggested:
          type: string
          description: The AI's HVAC interpretation of the phrase
        confidence:
          type: integer
          minimum: 0
          maximum: 100
          description: Confidence score for this specific phrase (0–100)
      required:
        - original
        - suggested
        - confidence
    VoiceMemoryExtracts:
      type: object
      description: Structured equipment memory data extracted from the interpreted transcript
      properties:
        componentsReplaced:
          type: array
          items:
            type: string
          description: Parts or components that were replaced
        repairsPerformed:
          type: array
          items:
            type: string
          description: Repairs or corrective actions performed
        refrigerantType:
          type: string
          description: Refrigerant type if mentioned (e.g. R-22, R-410A)
        refrigerantAmount:
          type: string
          description: Refrigerant amount with units if mentioned (e.g. 8 lb 12 oz)
        followUp:
          type: string
          description: Follow-up work recommended or required
        pmReminders:
          type: string
          description: Preventive maintenance reminders extracted
        observedConditions:
          type: string
          description: Notable conditions observed during the visit
        warrantyInfo:
          type: string
          description: Any warranty-relevant information mentioned
      required:
        - componentsReplaced
        - repairsPerformed
    VoiceInterpretResult:
      type: object
      description: Full result from the HVAC Voice Intelligence pipeline
      properties:
        original:
          type: string
          description: The raw transcript exactly as received — never modified
        professional:
          type: string
          description: Professional HVAC service documentation suitable for service records
        customer:
          type: string
          description: Plain-English summary suitable for building owners or facilities managers
        confidence:
          type: integer
          minimum: 0
          maximum: 100
          description: Overall interpretation confidence score (0–100)
        uncertainPhrases:
          type: array
          items:
            $ref: "#/components/schemas/VoiceUncertainPhrase"
          description: Phrases the AI was less than 85% confident in interpreting
        memoryExtracts:
          $ref: "#/components/schemas/VoiceMemoryExtracts"
      required:
        - original
        - professional
        - customer
        - confidence
        - uncertainPhrases
        - memoryExtracts
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    DiagnoseHvacBody:
      type: object
      properties:
        symptoms:
          type: string
          description: Description of HVAC symptoms
        clientId:
          type: string
          description: Anonymous client identifier for Pro status lookup
        testerEmail:
          type: string
          description: Optional tester email for Apple/Google review bypass
      required:
        - symptoms
    HvacDiagnosisEntry:
      type: object
      description: A single matched diagnostic entry from the knowledge base
      properties:
        id:
          type: string
          description: Knowledge base entry ID
        title:
          type: string
          description: Specific diagnostic title (e.g. "Carrier RTU — Compressor Hard Start")
        category:
          type: string
          description: Broad fault category (e.g. "No Cool", "Trips Breaker")
        whyThisFits:
          type: string
          description: Explanation of why this entry matched the symptoms
        likelyCauses:
          type: array
          items:
            type: string
          description: Ranked list of likely root causes
        firstChecks:
          type: array
          items:
            type: string
          description: Field-level checks a technician should perform first
        meterChecks:
          type: array
          items:
            type: string
          description: Specific meter and instrument measurements to take
        priorityLevel:
          type: string
          enum: [low, medium, high, critical]
          description: Urgency of repair
        confidencePercent:
          type: integer
          minimum: 0
          maximum: 100
          description: Match confidence percentage
        recommendedAction:
          type: string
          description: Recommended course of action
        riskNote:
          type: string
          description: Safety or operational risk if this issue is left unaddressed
      required:
        - id
        - title
        - category
        - whyThisFits
        - likelyCauses
        - firstChecks
        - meterChecks
        - priorityLevel
        - confidencePercent
        - recommendedAction
        - riskNote
    HvacDiagnosisResult:
      type: object
      description: Top diagnosis match plus up to 2 alternatives
      properties:
        primary:
          $ref: "#/components/schemas/HvacDiagnosisEntry"
        alternatives:
          type: array
          items:
            $ref: "#/components/schemas/HvacDiagnosisEntry"
          description: Up to 2 alternative diagnostic matches ranked by confidence
        isPro:
          type: boolean
          description: Whether this response contains full Pro-tier data
      required:
        - primary
        - alternatives
        - isPro
